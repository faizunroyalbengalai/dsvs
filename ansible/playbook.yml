---
- name: Deploy fbhs
  hosts: all
  become: true
  gather_facts: yes
  # Retry SSH connections — EC2 instances sometimes drop the connection under load
  # during the first heavy task (apt-get update) right after boot.
  vars:
    ansible_ssh_retries: 5
    app_dir: /opt/app
    app_port: 80
    project: 'fbhs'
    web_server: 'nginx'
    # Laravel 11 requires PHP >= 8.2.
    php_version: '8.2'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Wait for SSH to be fully ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _apt_update
      until: _apt_update is succeeded

    # ── Local database installation ───────────────────────────────────────────
    - name: Install PostgreSQL server
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present
        update_cache: yes

    - name: Ensure PostgreSQL is started
      systemd:
        name: postgresql
        state: started
        enabled: yes

    - name: Wait for PostgreSQL to be ready
      wait_for:
        port: 5432
        host: 127.0.0.1
        timeout: 60

    - name: Create PostgreSQL database and user
      shell: |
        DB_NAME="{{ lookup('env', 'DB_NAME') | default(project | replace('-', '_') + 'db', true) }}"
        DB_USER="{{ lookup('env', 'DB_USERNAME') | default('appuser', true) }}"
        DB_PASS="{{ lookup('env', 'DB_PASSWORD') | default('apppass', true) }}"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE DATABASE \"$DB_NAME\";"
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1 \
          || sudo -u postgres psql -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE \"$DB_NAME\" TO \"$DB_USER\";"
        sudo -u postgres psql -c "ALTER DATABASE \"$DB_NAME\" OWNER TO \"$DB_USER\";"
      args:
        executable: /bin/bash

    # ── Web server (nginx / apache / none) ────────────────────────────────────
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: preserve
      notify: Restart app

    # Laravel 11 requires PHP >= 8.2. Default Ubuntu 22.04 apt repos only ship
    # PHP 8.1, so we add the well-known ondrej/php PPA which provides 8.0-8.4.
    - name: Install software-properties-common (for add-apt-repository)
      apt:
        name: [software-properties-common, ca-certificates, lsb-release, gnupg, curl]
        state: present
        update_cache: yes

    - name: Add ondrej/php PPA (provides PHP 8.2+ on Ubuntu)
      shell: |
        add-apt-repository -y ppa:ondrej/php
        apt-get update -qq
      args:
        executable: /bin/bash
        creates: /etc/apt/sources.list.d/ondrej-ubuntu-php-*.list

    - name: Install PHP {{ php_version or '8.2' }} and extensions (Laravel)
      apt:
        name: ["php{{ php_version or '8.2' }}", "php{{ php_version or '8.2' }}-fpm",
               "php{{ php_version or '8.2' }}-cli", "php{{ php_version or '8.2' }}-mbstring",
               "php{{ php_version or '8.2' }}-xml", "php{{ php_version or '8.2' }}-curl",
               "php{{ php_version or '8.2' }}-zip", "php{{ php_version or '8.2' }}-pgsql",
               "php{{ php_version or '8.2' }}-mysql", "php{{ php_version or '8.2' }}-sqlite3",
               "php{{ php_version or '8.2' }}-bcmath", "php{{ php_version or '8.2' }}-intl",
               "unzip", "git"]
        state: present
        update_cache: yes

    - name: Register php{{ php_version or '8.2' }} as a system alternative
      shell: |
        update-alternatives --install /usr/bin/php php /usr/bin/php{{ php_version or '8.2' }} 100
        update-alternatives --set     php /usr/bin/php{{ php_version or '8.2' }}
      args:
        executable: /bin/bash

    - name: Verify default php is 8.2+
      shell: php -v | head -1
      args:
        executable: /bin/bash
      register: php_version_check
      changed_when: false

    - name: Show resolved PHP version
      debug:
        msg: "Active PHP: {{ php_version_check.stdout }}"

    # Composer is downloaded with the explicit php{{ php_version }} binary so
    # we do NOT depend on the bare `php` symlink picking the right version.
    # Composer install for Laravel 11 needs ~512MB peak memory; small EC2
    # instances (t3.micro, 1GB) run out during dependency resolution. A 1GB
    # swap file gives composer enough virtual memory to finish.
    - name: Ensure swap file exists (1GB) for composer install
      shell: |
        if ! swapon --show | grep -q '/swapfile'; then
          fallocate -l 1G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=1024
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          grep -q '/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
        fi
      args:
        executable: /bin/bash

    - name: Install Composer (using php{{ php_version or '8.2' }} explicitly)
      shell: |
        curl -sS https://getcomposer.org/installer | php{{ php_version or '8.2' }} -- --install-dir=/usr/local/bin --filename=composer
      args:
        executable: /bin/bash
        creates: /usr/local/bin/composer

    - name: Install Laravel dependencies (forced via php{{ php_version or '8.2' }})
      shell: |
        cd {{ app_dir }}
        php{{ php_version or '8.2' }} -d memory_limit=-1 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist 2>&1
      args:
        executable: /bin/bash
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"
        COMPOSER_MEMORY_LIMIT: "-1"
        COMPOSER_PROCESS_TIMEOUT: "600"

    - name: Create .env file
      shell: |
        cp -n {{ app_dir }}/.env.example {{ app_dir }}/.env || true
        cd {{ app_dir }}
        php{{ php_version or '8.2' }} artisan key:generate --force
      args:
        executable: /bin/bash

    - name: Set Laravel storage permissions
      file:
        path: "{{ app_dir }}/storage"
        owner: www-data
        group: www-data
        recurse: yes
        mode: '0775'

    - name: Set Laravel bootstrap/cache permissions
      file:
        path: "{{ app_dir }}/bootstrap/cache"
        owner: www-data
        group: www-data
        recurse: yes
        mode: '0775'

    - name: Enable PHP-FPM
      systemd:
        name: "php{{ php_version or '8.2' }}-fpm"
        enabled: yes
        state: started

    - name: Reload and start web server
      service:
        name: "{{ 'apache2' if (web_server or 'nginx').lower() == 'apache' else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      service:
        name: nginx
        state: reloaded
